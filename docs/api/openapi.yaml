    put:
      tags: [配置]
      operationId: updateASRS3Config
      summary: 更新 ASR S3 配置(密钥三态)
      description: |
        全字段可选。endpoint 传了必须合法 http(s) + host,禁 .. 和反斜杠。
        ⚠️ 注意:更新此处的 access_key_secret 走 secrets,与
        `PUT /api/secrets/{ASRS3EffectiveAccessKeyEnv}` 互斥(后者被特殊拒绝,见密钥域)。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: 'components/schemas/config-sections.yaml#/ASRS3ConfigRequest'
      responses:
        '200':
          description: 更新后的 ASR S3 配置
          content:
            application/json:
              schema:
                $ref: 'components/schemas/config-sections.yaml#/ASRS3ConfigResponse'
        '400':
          description: 字段值非法
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/Error'
        '401':
          $ref: '#/paths/~1api~1health~1runtime/get/responses/401'

  /api/config/webdav:
    get:
      tags: [配置]
      operationId: getWebDAVConfig
      summary: 获取 WebDAV 配置
      responses:
        '200':
          description: WebDAV 配置
          content:
            application/json:
              schema:
                $ref: 'components/schemas/config-sections.yaml#/WebDAVConfigResponse'
        '401':
          $ref: '#/paths/~1api~1health~1runtime/get/responses/401'
    put:
      tags: [配置]
      operationId: updateWebDAVConfig
      summary: 更新 WebDAV 配置(密钥三态)
      description: |
        全字段可选。url/base_path/remote 有格式校验。
        ⚠️ password 走 secrets,与 `PUT /api/secrets/{WebDAVEffectivePasswordEnv}` 互斥。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: 'components/schemas/config-sections.yaml#/WebDAVConfigRequest'
      responses:
        '200':
          description: 更新后的 WebDAV 配置
          content:
            application/json:
              schema:
                $ref: 'components/schemas/config-sections.yaml#/WebDAVConfigResponse'
