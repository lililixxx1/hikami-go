        '401':
          $ref: '#/paths/~1api~1health~1runtime/get/responses/401'
    put:
      tags: [配置]
      operationId: updateArchiveConfig
      summary: 更新归档配置
      description: 全字段可选。cleanup_policy 传了必须在 [none,temp,generated,all]。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: 'components/schemas/config-sections.yaml#/ArchiveConfigRequest'
      responses:
        '200':
          description: 更新后的归档配置
          content:
            application/json:
              schema:
                $ref: 'components/schemas/config-sections.yaml#/ArchiveConfigResponse'
        '400':
          description: cleanup_policy 非法
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/Error'
        '401':
          $ref: '#/paths/~1api~1health~1runtime/get/responses/401'

  /api/config/export:
    get:
      tags: [配置]
      operationId: exportConfig
      summary: 导出全部配置(含明文密钥)
      description: |
        导出 ConfigExportBundle:6 段全局配置 + secrets(明文)+ channels +
        glossary + templates + bili_accounts。
        ⚠️ **响应包含明文密钥**,仅用于备份/迁移,不要外传。
      responses:
        '200':
          description: 配置备份 bundle
          content:
            application/json:
              schema:
                $ref: 'components/schemas/config-sections.yaml#/ConfigExportBundle'
        '401':
          $ref: '#/paths/~1api~1health~1runtime/get/responses/401'

  /api/config/import:
    post:
      tags: [配置]
      operationId: importConfig
      summary: 导入配置(merge 或 overwrite)
      description: |
        请求体是 ConfigExportBundle(export 的产物)。
        **两阶段事务化**:
        - 阶段一:6 段 + secrets 绑进同一 WithTx 事务(commit 成功后才改内存 cfg + env)
        - 阶段二(仅 overwrite):清 glossary/templates/cookies
        overwrite 的 WebDAV/ASRS3 tombstone:清了 secrets 但 bundle 无对应 env → managed=true。
      parameters:
        - name: strategy
          in: query
          required: false
          schema:
            type: string
            enum: [merge, overwrite]
            default: merge
          description: "merge=合并(已存在的不覆盖);overwrite=全覆盖(清 glossary/templates/cookies)"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: 'components/schemas/config-sections.yaml#/ConfigExportBundle'
      responses:
        '200':
          description: 导入结果
          content:
            application/json:
              schema:
                $ref: 'components/schemas/config-sections.yaml#/ConfigImportResult'
        '400':
          description: strategy 非法,或 version 非 "1",或段内字段非法
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/Error'
        '401':
          $ref: '#/paths/~1api~1health~1runtime/get/responses/401'
        '500':
          description: 持久化失败(事务回滚,内存 cfg 与 env 不变)
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/Error'

