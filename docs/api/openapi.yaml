openapi: 3.0.3
info:
  title: Hikami-Go API
  version: 1.0.0
  description: |
    B 站直播回顾自动生成服务的后端 HTTP API。

    本规范描述后端现状(internal/handler/server.go 的 ~80 个 HTTP 端点 + WebSocket 事件契约),
    作为 Vue 3 前端全页面重写的契约源。本规范不包含 HTML 模板与后端接口的差异,后者见 `api-gap-analysis.md`。

    **真相源约定**:所有字段以 `internal/handler/server.go` 及各业务包 Go struct 的 `json:"..."` tag
    为唯一真相。`web/src/api/types.ts` 仅作交叉验证(有漂移)。

    **路径参数风格**:OpenAPI 用 `{id}`,对应 Gin 的 `:id`。

    **nullable 约定**:
    - `*T` 带 `omitempty` → 字段缺席(不写 nullable,不进 required)
    - `*T` 无 omitempty(如 gin.H 里的 nil 指针)→ 字段必出现,值可为 null(写 `nullable: true`)
  contact:
    name: Hikami-Go
servers:
  - url: http://127.0.0.1:6334
    description: 默认本机监听(internal/config web.listen 默认值)
security:
  - AdminToken: []
components:
  securitySchemes:
    AdminToken:
      type: apiKey
      in: header
      name: X-Admin-Token
      description: |
        管理员令牌。`admin_token` 为空时(loopback)中间件放行;绑非 loopback 时强制。
        兼容 `Authorization: Bearer <token>`。缺失/错误 → 401 `{error: "missing or invalid admin token"}`。
  parameters:
    ChannelID:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: 频道 ID
    SessionID:
      name: sid
      in: path
      required: true
      schema:
        type: string
      description: 场次 ID
    TaskID:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: 任务 ID
    LiveChannelID:
      name: channel_id
      in: path
      required: true
      schema:
        type: string
      description: 频道 ID
    AccountID:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
      description: 账号 ID
    QRSessionID:
      name: session_id
      in: path
      required: true
      schema:
        type: string
      description: QR 登录会话 ID
    SecretKey:
      name: key
      in: path
      required: true
      schema:
        type: string
      description: 密钥 env 名(限 KnownKeys 白名单)
    GlossaryEntryID:
      name: eid
      in: path
      required: true
      schema:
        type: integer
        format: int64
      description: 词条 ID
    GlossaryCandidateID:
      name: cid
      in: path
      required: true
      schema:
        type: integer
        format: int64
      description: 候选词 ID
  responses:
    CapabilityUnavailable:
      description: |
        能力守卫失败:对应 Capability 不可用。
        响应 `{error: "<cap> capability unavailable", reason: "<原因汇总>"}`。
      content:
        application/json:
          schema:
            $ref: 'components/schemas/common.yaml#/Error'
    Unauthorized:
      description: 未授权(admin token 缺失或错误)
      content:
        application/json:
          schema:
            $ref: 'components/schemas/common.yaml#/Error'
    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: 'components/schemas/common.yaml#/Error'
    BadRequest:
      description: 请求体非法或必填字段缺失
      content:
        application/json:
          schema:
            $ref: 'components/schemas/common.yaml#/Error'
tags:
  - name: 系统
    description: healthz / runtime 状态 / onboarding
  - name: 频道
    description: 主播频道 CRUD + identify + copy-config
  - name: 场次
    description: 录播/回放/导入场次 + discover 发现 + 回顾生成 + 发布/归档 + glossary
  - name: 任务
    description: 异步任务查询与重试/取消
  - name: 运行时
    description: 直播状态 / cookies / 统计 / 诊断
  - name: 配置
    description: 6 组配置段 + 模型列表 + 导入导出
  - name: 术语表
    description: 全局 / 主播级 glossary 词条 + 候选审批
  - name: 回顾模板
    description: 全局 / 主播级回顾模板 + 预设
  - name: B站账号
    description: QR 扫码登录 + cookie 账号管理 + 兼容别名
  - name: 密钥
    description: 环境变量级密钥查询/更新
  - name: WebSocket
    description: 任务进度推送事件
paths:
  # ───────── 系统域(T1)─────────
  /api/healthz:
    get:
      tags: [系统]
      operationId: getHealthz
      summary: 健康检查
      description: |
        liveness 探针。**无需 admin token**(路由注册在 adminTokenMiddleware 之外,server.go:278)。
      security: []
      responses:
        '200':
          description: 服务存活
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    example: ok

  /api/health/runtime:
    get:
      tags: [系统]
      operationId: getRuntimeStatus
      summary: 运行时能力探测
      description: |
        返回工具可用性、能力开关、配置就绪状态、cookie 告警、磁盘占用,
        以及默认下载/发布账号是否存在。
        前端首页能力卡据此渲染。
      responses:
        '200':
          description: 探测结果
          content:
            application/json:
              schema:
                $ref: 'components/schemas/runtime.yaml#/RuntimeStatus'
        '401':
          description: 未授权
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/Error'

  /api/onboarding/status:
    get:
      tags: [系统]
      operationId: getOnboardingStatus
      summary: 新手引导状态
      description: |
        判断是否需要显示新手引导(未跳过 && (工具不全 || 密钥未设 || 无频道))。
      responses:
        '200':
          description: 引导状态
          content:
            application/json:
              schema:
                $ref: 'components/schemas/runtime.yaml#/OnboardingStatus'
        '401':
          description: 未授权
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/Error'

  /api/onboarding/dismiss:
    post:
      tags: [系统]
      operationId: dismissOnboarding
      summary: 跳过新手引导
      description: |
        在 secrets 表写入 `_onboarding_dismissed=true`,之后 onboarding/status 返回 needed=false。
        无请求体。
      responses:
        '200':
          description: 已跳过
          content:
            application/json:
              schema:
                $ref: 'components/schemas/runtime.yaml#/OnboardingDismissResponse'
        '401':
          description: 未授权
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/Error'

  # ───────── WebSocket(文档锚点,非 REST)─────────
  /ws:
    get:
      tags: [WebSocket]
      operationId: websocketTaskProgress
      summary: 任务进度推送(WebSocket 升级端点)
      description: |
        gorilla/websocket Upgrade 端点。

        **路径是 `/ws`(无 `/api` 前缀)**,见 server.go:275。
        **无需 admin token**。

        OpenAPI 3.0 不原生支持 WebSocket,本条目仅作文档锚点。
        实际协议:
        - 客户端发起 HTTP GET(带 `Upgrade: websocket` 头)
        - 服务端返回 `101 Switching Protocols` 升级为 WebSocket
        - 服务端**只 WriteJSON 推送** `task_progress` 事件,**不读**客户端消息(单向推送)
        - 事件 schema 见 `components/schemas/websocket.yaml#/TaskProgressEvent`

        前端连接示例:`new WebSocket('ws://127.0.0.1:6334/ws')`(注意无 token、无 /api)。
      security: []
      responses:
        '101':
          description: Switching Protocols(WebSocket 握手成功)
        '401':
          description: 未授权(实际本端点不校验,仅作文档占位)
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/Error'

  # ───────── 频道域(T2)─────────
  /api/channels:
    get:
      tags: [频道]
      operationId: listChannels
      summary: 列出所有频道
      description: "返回全部频道(无分页)。响应 {items: [Channel]}。"
      responses:
        '200':
          description: 频道列表
          content:
            application/json:
              schema:
                $ref: 'components/schemas/channel.yaml#/ChannelsListResponse'
        '401':
          $ref: '#/paths/~1api~1health~1runtime/get/responses/401'
    post:
      tags: [频道]
      operationId: createChannel
      summary: 创建频道
      description: |
        新建频道。请求体 UpsertChannelInput。
        **注意 `auto_recap` 三态**:字段缺席=默认 false;传 true/false 显式设置。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: 'components/schemas/channel.yaml#/UpsertChannelInput'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: 'components/schemas/channel.yaml#/Channel'
        '400':
          description: 请求体非法(JSON 解析失败)
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/Error'
        '401':
          $ref: '#/paths/~1api~1health~1runtime/get/responses/401'

  /api/channels/{id}:
    parameters:
      - $ref: '#/components/parameters/ChannelID'
    get:
      tags: [频道]
      operationId: getChannel
      summary: 获取单个频道详情
      description: 返回单个频道的完整字段。序列化形态与 listChannels 的单元素一致。
      responses:
        '200':
          description: 频道详情
          content:
            application/json:
              schema:
                $ref: 'components/schemas/channel.yaml#/Channel'
        '401':
          $ref: '#/paths/~1api~1health~1runtime/get/responses/401'
        '404':
          description: 频道不存在
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/Error'
    put:
      tags: [频道]
      operationId: updateChannel
      summary: 更新频道
      description: |
        全量更新(presence-aware:未传的字段保持原值)。
        `auto_recap`/`download_account_id` 三态语义见 schema。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: 'components/schemas/channel.yaml#/UpsertChannelInput'
      responses:
        '200':
          description: 更新后的频道
          content:
            application/json:
              schema:
                $ref: 'components/schemas/channel.yaml#/Channel'
        '400':
          description: 请求体非法
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/Error'
        '401':
          $ref: '#/paths/~1api~1health~1runtime/get/responses/401'
    delete:
      tags: [频道]
      operationId: deleteChannel
      summary: 删除频道
      description: |
        删除频道。若有关联场次(`channel.ErrInUse`)→ 409 + `{error, session_count}`。
      responses:
        '200':
          description: "已删除(后端返回 {message: ok} 或类似)"
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '401':
          $ref: '#/paths/~1api~1health~1runtime/get/responses/401'
        '409':
          description: 频道有关联场次,不能删除
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/ErrorWithSessionCount'

  /api/channels/identify:
    post:
      tags: [频道]
      operationId: identifyChannel
      summary: 识别主播(不保存)
      description: |
        根据 input 字符串(房间号/URL/UID)查询 B 站 API 获取频道信息,**不写库**。
        识别失败(网络错误、B站 -352 风控等)→ 500/502。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: 'components/schemas/channel.yaml#/IdentifyInput'
      responses:
        '200':
          description: 识别结果(未保存)
          content:
            application/json:
              schema:
                $ref: 'components/schemas/channel.yaml#/IdentifyResult'
        '400':
          description: 请求体非法
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/Error'
        '401':
          $ref: '#/paths/~1api~1health~1runtime/get/responses/401'

  /api/channels/identify/save:
    post:
      tags: [频道]
      operationId: saveIdentifiedChannel
      summary: 识别并保存主播
      description: |
        识别后直接写库(已存在则更新,不存在则创建)。
        created=true → **201**;created=false → **200**。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: 'components/schemas/channel.yaml#/IdentifyInput'
      responses:
        '200':
          description: 已更新(created=false)
          content:
            application/json:
              schema:
                $ref: 'components/schemas/channel.yaml#/IdentifySaveResult'
        '201':
          description: 已创建(created=true)
          content:
            application/json:
              schema:
                $ref: 'components/schemas/channel.yaml#/IdentifySaveResult'
        '400':
          description: 请求体非法
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/Error'
        '401':
          $ref: '#/paths/~1api~1health~1runtime/get/responses/401'

  /api/channels/{id}/copy-config:
    parameters:
      - $ref: '#/components/parameters/ChannelID'
    post:
      tags: [频道]
      operationId: copyChannelConfig
      summary: 复制频道配置到另一频道
      description: |
        把源频道(路径参数 `id`)的术语表/模板/发布配置/自动化/回顾模型
        复制到目标频道(请求体 target_channel_id)。
        target_channel_id 必填,空串→400。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: 'components/schemas/channel.yaml#/CopyConfigRequest'
      responses:
        '200':
          description: 复制结果(字段按请求的 copy_* 选择性出现)
          content:
            application/json:
              schema:
                $ref: 'components/schemas/channel.yaml#/CopyConfigResponse'
        '400':
          description: target_channel_id 缺失或请求体非法
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/Error'
        '401':
          $ref: '#/paths/~1api~1health~1runtime/get/responses/401'

  # ───────── 场次域(T3)─────────
  /api/sessions:
    get:
      tags: [场次]
      operationId: listSessions
      summary: 列出全部场次
      description: "返回全部场次(无分页)。响应 {items: [Session]}。"
      parameters:
        - name: status
          in: query
          schema:
            type: string
          description: 按状态过滤(可选,未传则返回全部)
        - name: channel_id
          in: query
          schema:
            type: string
          description: 按频道精确过滤(可选,未传则不按频道过滤)
        - name: source
          in: query
          schema:
            type: string
          description: 按 source_type 过滤(live/download/import,可选)
        - name: search
          in: query
          schema:
            type: string
          description: 按 title/source_id/id 模糊搜索(可选,大小写不敏感)
      responses:
        '200':
          description: 场次列表
          content:
            application/json:
              schema:
                $ref: 'components/schemas/session.yaml#/SessionsListResponse'
        '401':
          $ref: '#/paths/~1api~1health~1runtime/get/responses/401'

  /api/sessions/{sid}:
    parameters:
      - $ref: '#/components/parameters/SessionID'
    get:
      tags: [场次]
      operationId: getSession
      summary: 获取场次详情
      description: "返回 session + 关联文件列表。响应 {session, files}。"
      responses:
        '200':
          description: 场次详情
          content:
            application/json:
              schema:
                $ref: 'components/schemas/session.yaml#/SessionDetailResponse'
        '401':
          $ref: '#/paths/~1api~1health~1runtime/get/responses/401'
        '404':
          description: 场次不存在
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/Error'
    delete:
      tags: [场次]
      operationId: deleteSession
      summary: 删除场次
      description: |
        删除场次及其关联任务(`DeleteBySession`),并从 sessions 表删除。
        **成功返回 204 No Content**(无响应体)。
      responses:
        '204':
          description: 已删除(无响应体)
        '401':
          $ref: '#/paths/~1api~1health~1runtime/get/responses/401'
        '404':
          description: 场次不存在
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/Error'

  /api/sessions/failed:
    delete:
      tags: [场次]
      operationId: deleteFailedSessions
      summary: 删除所有失败场次
      description: |
        先删除失败场次关联的所有任务(不限状态),再删除 sessions。
        返回 `{deleted: N}`。
      responses:
        '200':
          description: 已删除的失败场次数
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/DeletedCountResponse'
        '401':
          $ref: '#/paths/~1api~1health~1runtime/get/responses/401'

  /api/sessions/download:
    post:
      tags: [场次]
      operationId: downloadSession
      summary: 下载已发现的回放场次
      description: |
        对已 discover 出的 download 场次入队下载任务。
        返回 202 + Task(下载任务)。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: 'components/schemas/session.yaml#/DownloadSessionRequest'
      responses:
        '202':
          description: 下载任务已入队
          content:
            application/json:
              schema:
                $ref: 'components/schemas/task.yaml#/Task'
        '400':
          description: session_id 缺失
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/Error'
        '401':
          $ref: '#/paths/~1api~1health~1runtime/get/responses/401'

  /api/sessions/download-by-url:
    post:
      tags: [场次]
      operationId: downloadSessionByURL
      summary: 按 URL 创建下载场次
      description: |
        接收视频链接(B 站 BV 号等)+ 主播 ID,创建 download 场次并入队。
        **前置能力守卫**:Capabilities.ReplayDownload 不可用 → 409 + reason。
        返回 202 + Task。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: 'components/schemas/session.yaml#/DownloadByURLRequest'
      responses:
        '202':
          description: 下载任务已入队
          content:
            application/json:
              schema:
                $ref: 'components/schemas/task.yaml#/Task'
        '400':
          description: channel_id 或 url 缺失
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/Error'
        '401':
          $ref: '#/paths/~1api~1health~1runtime/get/responses/401'
        '409':
          $ref: '#/components/responses/CapabilityUnavailable'

  /api/sessions/import:
    post:
      tags: [场次]
      operationId: importSession
      summary: 导入本地媒体文件
      description: |
        **multipart/form-data**(非 JSON)。
        创建 import 场次并入队 normalize 任务。
        media_file 必填;channel_id + title 必填;started_at/ended_at 可选(RFC3339);
        danmaku_file 可选;source_url 可选。
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [media_file, channel_id, title]
              properties:
                media_file:
                  type: string
                  format: binary
                  description: 媒体文件(必填)
                channel_id:
                  type: string
                  description: 归属主播 ID(必填)
                title:
                  type: string
                  description: 场次标题(必填)
                started_at:
                  type: string
                  description: 开播时间(可选,RFC3339)
                ended_at:
                  type: string
                  description: 结束时间(可选,RFC3339)
                source_url:
                  type: string
                  description: 源 URL(可选)
                danmaku_file:
                  type: string
                  format: binary
                  description: 弹幕文件(可选)
      responses:
        '202':
          description: normalize 任务已入队
          content:
            application/json:
              schema:
                $ref: 'components/schemas/task.yaml#/Task'
        '400':
          description: media_file 缺失,或 channel_id/title 缺失,或时间格式非法
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/Error'
        '401':
          $ref: '#/paths/~1api~1health~1runtime/get/responses/401'

  /api/sessions/discover:
    post:
      tags: [场次]
      operationId: discoverSessions
      summary: 发现所有频道的新回放(一步式)
      description: |
        遍历所有启用且配了 ReplaySourceURL 的主播,跑 yt-dlp 列出回放,
        **直接建 download 场次 + 入队下载**(一步式)。
        返回 202 + `{items: [DiscoverResult]}`。
      responses:
        '202':
          description: 发现完成,已建场次和入队
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: 'components/schemas/discover.yaml#/DiscoverResult'
        '401':
          $ref: '#/paths/~1api~1health~1runtime/get/responses/401'

  /api/sessions/discover/preview:
    post:
      tags: [场次]
      operationId: discoverPreviewAll
      summary: 预览所有频道的新回放(两步式 · 第一步)
      description: |
        遍历所有频道预览回放(**不建场次、不入队**)。
        每条 Result 带 `exists` 标记(是否已建过 download 场次),前端据此标记「已处理」。
        复用 DiscoverChannel 的 discover_limit 语义(按频道 limit 截断新项)。
        返回 200 + `{items: [DiscoverResult]}`。
      responses:
        '200':
          description: 预览结果(未建场次)
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: 'components/schemas/discover.yaml#/DiscoverResult'
        '401':
          $ref: '#/paths/~1api~1health~1runtime/get/responses/401'

  /api/sessions/discover/execute:
    post:
      tags: [场次]
      operationId: discoverExecute
      summary: 执行勾选的回放下载(两步式 · 第二步)
      description: |
        按前端勾选的 entry 列表建 download 场次 + 入队下载任务。
        **不重跑 yt-dlp**——复用预览阶段已拿到的 entry 信息。
        返回 202 + `{items: [DiscoverResult]}`。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: 'components/schemas/discover.yaml#/DiscoverExecuteRequest'
      responses:
        '202':
          description: 已按勾选项建场次入队
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: 'components/schemas/discover.yaml#/DiscoverResult'
        '400':
          description: 请求体非法
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/Error'
        '401':
          $ref: '#/paths/~1api~1health~1runtime/get/responses/401'

  /api/sessions/{sid}/asr/submit:
    parameters:
      - $ref: '#/components/parameters/SessionID'
    post:
      tags: [场次]
      operationId: submitASR
      summary: 提交 ASR 转写任务
      description: |
        为场次创建 ASR 转写任务。
        **能力守卫**:Capabilities.ASRSubmit 不可用 → 409 + reason。
        返回 202 + Task。
      responses:
        '202':
          description: ASR 任务已入队
          content:
            application/json:
              schema:
                $ref: 'components/schemas/task.yaml#/Task'
        '401':
          $ref: '#/paths/~1api~1health~1runtime/get/responses/401'
        '404':
          description: 场次不存在
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/Error'
        '409':
          description: |
            能力不可用(ASR)或场次状态不允许(recap.ErrSessionNotReady /
            recap.ErrTranscriptMissing 等会映射为 409)。
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/Error'

  /api/sessions/{sid}/recap/generate:
    parameters:
      - $ref: '#/components/parameters/SessionID'
    post:
      tags: [场次]
      operationId: generateRecap
      summary: 生成整场回顾
      description: |
        为场次创建回顾生成任务。
        **双层守卫**:
        1. 能力守卫:Capabilities.RecapGenerate 不可用 → 409 + reason(能力原因)
        2. 业务守卫:recap.ErrSessionNotReady / ErrTranscriptMissing / ErrRecapUnavailable
           → 409 + reason(业务原因)
        返回 202 + Task。
      responses:
        '202':
          description: 回顾任务已入队
          content:
            application/json:
              schema:
                $ref: 'components/schemas/task.yaml#/Task'
        '401':
          $ref: '#/paths/~1api~1health~1runtime/get/responses/401'
        '404':
          description: 场次不存在
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/Error'
        '409':
          description: 能力守卫(RecapGenerate)或业务守卫(场次未就绪/转写缺失)失败
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/Error'

  /api/sessions/{sid}/recap/regenerate:
    parameters:
      - $ref: '#/components/parameters/SessionID'
    post:
      tags: [场次]
      operationId: regenerateRecap
      summary: 重新生成回顾(覆盖本地 md,不碰 B站)
      description: |
        重新生成整场回顾(覆盖本地 md,不碰 B 站专栏)。
        仅 recap_done/published 状态允许。
        任务带 **BypassFailState=true**:失败时仅写 last_error,**不降级** published/recap_done 主状态。
        **双层守卫**同 generateRecap(能力 + 业务)。
        返回 202 + Task。
      responses:
        '202':
          description: 重新生成任务已入队
          content:
            application/json:
              schema:
                $ref: 'components/schemas/task.yaml#/Task'
        '401':
          $ref: '#/paths/~1api~1health~1runtime/get/responses/401'
        '404':
          description: 场次不存在
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/Error'
        '409':
          description: 能力守卫或业务守卫失败
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/Error'

  /api/sessions/{sid}/recap-partial:
    parameters:
      - $ref: '#/components/parameters/SessionID'
    post:
      tags: [场次]
      operationId: generateRecapPartial
      summary: 按时间区间生成回顾(局部)
      description: |
        按 [start_time, end_time] 区间生成回顾(秒)。
        **双层守卫**同 generateRecap。返回 202 + Task。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: 'components/schemas/session.yaml#/RecapPartialRequest'
      responses:
        '202':
          description: 局部回顾任务已入队
          content:
            application/json:
              schema:
                $ref: 'components/schemas/task.yaml#/Task'
        '400':
          description: 时间区间非法(end_time 必须 > start_time,均 ≥0)
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/Error'
        '401':
          $ref: '#/paths/~1api~1health~1runtime/get/responses/401'
        '404':
          description: 场次不存在
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/Error'
        '409':
          description: 能力守卫或业务守卫失败
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/Error'

  /api/sessions/{sid}/recap-with-range:
    parameters:
      - $ref: '#/components/parameters/SessionID'
    post:
      tags: [场次]
      operationId: generateRecapWithRange
      summary: 按时间区间生成回顾(recap-with-range 别名)
      description: |
        与 recap-partial 完全相同(内部 `s.generateRecapPartial(ctx)` 转发)。
        保留两个路径是为了前端兼容。请求体/响应/守卫完全一致。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: 'components/schemas/session.yaml#/RecapPartialRequest'
      responses:
        '202':
          description: 局部回顾任务已入队
          content:
            application/json:
              schema:
                $ref: 'components/schemas/task.yaml#/Task'
        '400':
          description: 时间区间非法
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/Error'
        '401':
          $ref: '#/paths/~1api~1health~1runtime/get/responses/401'
        '404':
          description: 场次不存在
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/Error'
        '409':
          description: 能力守卫或业务守卫失败
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/Error'

  /api/sessions/{sid}/recap:
    parameters:
      - $ref: '#/components/parameters/SessionID'
    get:
      tags: [场次]
      operationId: getRecapContent
      summary: 获取回顾内容
      description: |
        读取场次生成的回顾 markdown / prompt / raw_response / suggested_terms。
        `available=false` 时其余字段为空串。
      responses:
        '200':
          description: 回顾内容
          content:
            application/json:
              schema:
                $ref: 'components/schemas/session.yaml#/RecapContent'
        '401':
          $ref: '#/paths/~1api~1health~1runtime/get/responses/401'
        '404':
          description: 场次不存在
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/Error'

  /api/sessions/{sid}/recap/content:
    parameters:
      - $ref: '#/components/parameters/SessionID'
    put:
      tags: [场次]
      operationId: updateRecapContent
      summary: 手动编辑回顾内容
      description: |
        覆盖本地回顾 markdown 文件。
        前置:`sess.LocalAvailable` 必须为 true(本地文件存在),否则
        recap.ErrTranscriptMissing → 409。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: 'components/schemas/session.yaml#/UpdateRecapContentRequest'
      responses:
        '200':
          description: 已更新
          content:
            application/json:
              schema:
                $ref: 'components/schemas/session.yaml#/MessageResponse'
        '400':
          description: content 为空或请求体非法
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/Error'
        '401':
          $ref: '#/paths/~1api~1health~1runtime/get/responses/401'
        '404':
          description: 场次不存在
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/Error'
        '409':
          description: 本地文件已移除(需先 fetch)
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/Error'

  /api/sessions/{sid}/upload:
    parameters:
      - $ref: '#/components/parameters/SessionID'
    post:
      tags: [场次]
      operationId: uploadSession
      summary: 上传场次到 WebDAV
      description: |
        创建 WebDAV 上传任务。
        **能力守卫**:Capabilities.WebDAVUpload 不可用 → 409 + reason。
        返回 202 + Task。
      responses:
        '202':
          description: 上传任务已入队
          content:
            application/json:
              schema:
                $ref: 'components/schemas/task.yaml#/Task'
        '401':
          $ref: '#/paths/~1api~1health~1runtime/get/responses/401'
        '404':
          description: 场次不存在
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/Error'
        '409':
          description: 能力不可用(WebDAVUpload)或场次状态不允许
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/Error'

  /api/sessions/{sid}/fetch:
    parameters:
      - $ref: '#/components/parameters/SessionID'
    post:
      tags: [场次]
      operationId: fetchSession
      summary: 从 WebDAV 拉取场次文件到本地
      description: |
        把已归档到 WebDAV 的场次文件拉回本地(LocalAvailable → true)。
        **能力守卫**:Capabilities.WebDAVUpload 不可用 → 409 + reason。
        返回 202 + `{session: Session}`(注意:此端点不返回 Task)。
      responses:
        '202':
          description: 已拉取
          content:
            application/json:
              schema:
                type: object
                required: [session]
                properties:
                  session:
                    $ref: 'components/schemas/session.yaml#/Session'
        '401':
          $ref: '#/paths/~1api~1health~1runtime/get/responses/401'
        '404':
          description: 场次不存在
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/Error'
        '409':
          description: 能力不可用或归档文件缺失
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/Error'

  /api/sessions/{sid}/publish:
    parameters:
      - $ref: '#/components/parameters/SessionID'
    post:
      tags: [场次]
      operationId: publishSession
      summary: 发布场次到 B 站专栏
      description: |
        创建发布任务。
        **能力守卫**:Capabilities.PublishOpus 不可用 → 409 + reason。
        业务错误:CookieMissing/Expired → 409/403;ContentRejected → 422;
        RateLimited → 429;BilibiliAPI → 502。
        返回 202 + Task。
      responses:
        '202':
          description: 发布任务已入队
          content:
            application/json:
              schema:
                $ref: 'components/schemas/task.yaml#/Task'
        '401':
          $ref: '#/paths/~1api~1health~1runtime/get/responses/401'
        '404':
          description: 场次不存在
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/Error'
        '409':
          description: 能力不可用或场次/cookie 状态不允许
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/Error'

  /api/sessions/{sid}/archive:
    parameters:
      - $ref: '#/components/parameters/SessionID'
    post:
      tags: [场次]
      operationId: archiveSession
      summary: 手动归档已发布场次到 WebDAV
      description: |
        自动归档失败时的手动重试入口。
        **能力守卫**:Capabilities.WebDAVUpload 不可用 → 409 + reason(归档与上传同一 WebDAV 后端)。
        返回 202 + Task。
      responses:
        '202':
          description: 归档任务已入队
          content:
            application/json:
              schema:
                $ref: 'components/schemas/task.yaml#/Task'
        '401':
          $ref: '#/paths/~1api~1health~1runtime/get/responses/401'
        '404':
          description: 场次不存在
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/Error'
        '409':
          description: 能力不可用或场次状态不允许归档
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/Error'

  /api/sessions/{sid}/glossary/discover:
    parameters:
      - $ref: '#/components/parameters/SessionID'
    post:
      tags: [场次]
      operationId: discoverSessionGlossary
      summary: 发现场次术语候选
      description: |
        读取场次 transcript,跑术语发现器生成候选词(异步,不返回候选列表)。
        前置:LocalAvailable + transcript.txt 存在,否则 recap.ErrTranscriptMissing → 409。
        返回 `{ok: true}`。
      responses:
        '200':
          description: 发现已触发
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/OkResponse'
        '401':
          $ref: '#/paths/~1api~1health~1runtime/get/responses/401'
        '404':
          description: 场次不存在
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/Error'
        '409':
          description: 本地文件已移除或 transcript 缺失
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/Error'
        '503':
          description: 术语发现器未配置(glossaryDiscoverer == nil)
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/Error'

  # ───────── 任务域(T4)─────────
  /api/tasks:
    get:
      tags: [任务]
      operationId: listTasks
      summary: 列出全部任务
      description: "返回全部任务(无分页)。响应 {items: [Task]}。"
      responses:
        '200':
          description: 任务列表
          content:
            application/json:
              schema:
                $ref: 'components/schemas/task.yaml#/TasksListResponse'
        '401':
          $ref: '#/paths/~1api~1health~1runtime/get/responses/401'

  /api/tasks/batch-retry:
    post:
      tags: [任务]
      operationId: batchRetryTasks
      summary: 批量重试任务
      description: |
        对一组 task_ids 批量重试。task_ids 必须非空(空数组→400)。
        返回 `{retried: N, tasks: [Task]}`。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: 'components/schemas/task.yaml#/BatchRetryRequest'
      responses:
        '200':
          description: 批量重试结果
          content:
            application/json:
              schema:
                $ref: 'components/schemas/task.yaml#/BatchRetryResponse'
        '400':
          description: task_ids 缺失或为空
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/Error'
        '401':
          $ref: '#/paths/~1api~1health~1runtime/get/responses/401'

  /api/tasks/failed:
    delete:
      tags: [任务]
      operationId: deleteFailedTasks
      summary: 删除所有失败任务
      description: |
        按状态 DeleteByStatus(failed)批量删除。
        返回 `{deleted: N}`。
      responses:
        '200':
          description: 已删除的失败任务数
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/DeletedCountResponse'
        '401':
          $ref: '#/paths/~1api~1health~1runtime/get/responses/401'

  /api/tasks/{id}:
    parameters:
      - $ref: '#/components/parameters/TaskID'
    get:
      tags: [任务]
      operationId: getTask
      summary: 获取任务详情(含条件字段)
      description: |
        返回 TaskDetailResponse:`{task, friendly_error?, auto_retry?}`。
        - `friendly_error` 仅 `status==failed && error!=""` 出现
        - `auto_retry` 仅 `status==failed` 且 `ShouldAutoRetry=true` 出现
      responses:
        '200':
          description: 任务详情
          content:
            application/json:
              schema:
                $ref: 'components/schemas/task.yaml#/TaskDetailResponse'
        '401':
          $ref: '#/paths/~1api~1health~1runtime/get/responses/401'
        '404':
          description: 任务不存在
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/Error'
    delete:
      tags: [任务]
      operationId: deleteTask
      summary: 删除任务
      description: |
        删除单个任务。**成功返回 204 No Content**(无响应体)。
      responses:
        '204':
          description: 已删除(无响应体)
        '401':
          $ref: '#/paths/~1api~1health~1runtime/get/responses/401'
        '404':
          description: 任务不存在
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/Error'

  /api/tasks/{id}/retry:
    parameters:
      - $ref: '#/components/parameters/TaskID'
    post:
      tags: [任务]
      operationId: retryTask
      summary: 重试任务
      description: |
        重试单个任务(Attempt+1,重新入队)。
        返回 202 + Task。
      responses:
        '202':
          description: 已重试
          content:
            application/json:
              schema:
                $ref: 'components/schemas/task.yaml#/Task'
        '401':
          $ref: '#/paths/~1api~1health~1runtime/get/responses/401'
        '404':
          description: 任务不存在
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/Error'
        '409':
          description: 任务状态冲突(如非 failed 不能重试)
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/Error'

  /api/tasks/{id}/cancel:
    parameters:
      - $ref: '#/components/parameters/TaskID'
    post:
      tags: [任务]
      operationId: cancelTask
      summary: 取消任务
      description: |
        取消运行中/待执行的任务(标记 cancelled)。
        **返回 200**(非 202) + Task。
      responses:
        '200':
          description: 已取消
          content:
            application/json:
              schema:
                $ref: 'components/schemas/task.yaml#/Task'
        '401':
          $ref: '#/paths/~1api~1health~1runtime/get/responses/401'
        '404':
          description: 任务不存在
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/Error'
        '409':
          description: 任务状态冲突(如已终态不能取消)
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/Error'

  # ───────── 运行时统计域(T5)─────────
  /api/live/check:
    post:
      tags: [运行时]
      operationId: checkLive
      summary: 检查所有频道直播状态并触发录制
      description: |
        CheckAndStartAll:遍历所有启用+auto_record 的频道,检查直播状态,
        对在直播的频道启动录制。**返回 202**(触发后台录制)。
      responses:
        '202':
          description: 已检查并触发录制
          content:
            application/json:
              schema:
                $ref: 'components/schemas/live.yaml#/LiveStatusListResponse'
        '401':
          $ref: '#/paths/~1api~1health~1runtime/get/responses/401'

  /api/live/status:
    get:
      tags: [运行时]
      operationId: liveStatus
      summary: 查询所有频道直播状态(不触发录制)
      description: "CheckAll:只查询不录制。响应 {items: [LiveStatus]}。"
      responses:
        '200':
          description: 直播状态列表
          content:
            application/json:
              schema:
                $ref: 'components/schemas/live.yaml#/LiveStatusListResponse'
        '401':
          $ref: '#/paths/~1api~1health~1runtime/get/responses/401'

  /api/live/{channel_id}/status:
    parameters:
      - $ref: '#/components/parameters/LiveChannelID'
    get:
      tags: [运行时]
      operationId: liveChannelStatus
      summary: 查询单频道直播状态
      description: |
        返回**直接对象**(非 `{items}` 包装)。`ctx.JSON(200, status)`。
      responses:
        '200':
          description: 单频道直播状态
          content:
            application/json:
              schema:
                $ref: 'components/schemas/live.yaml#/LiveStatus'
        '401':
          $ref: '#/paths/~1api~1health~1runtime/get/responses/401'
        '404':
          description: 频道不存在
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/Error'

  /api/live/{channel_id}/record/start:
    parameters:
      - $ref: '#/components/parameters/LiveChannelID'
    post:
      tags: [运行时]
      operationId: startLiveRecord
      summary: 手动启动单频道录制
      description: |
        手动启动指定频道录制(忽略 auto_record 开关)。
        **返回 202** + LiveStatus。
      responses:
        '202':
          description: 已启动录制
          content:
            application/json:
              schema:
                $ref: 'components/schemas/live.yaml#/LiveStatus'
        '401':
          $ref: '#/paths/~1api~1health~1runtime/get/responses/401'
        '404':
          description: 频道不存在
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/Error'
        '409':
          description: |
            状态冲突:已在录制(ErrAlreadyRecording)/未在直播(ErrNotLive)/
            直播被禁用(ErrLiveDisabled)等。
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/Error'

  /api/live/{channel_id}/record/stop:
    parameters:
      - $ref: '#/components/parameters/LiveChannelID'
    post:
      tags: [运行时]
      operationId: stopLiveRecord
      summary: 手动停止单频道录制
      description: |
        停止指定频道录制。**返回 202 Accepted,无响应体**(`ctx.Status(202)`)。
      responses:
        '202':
          description: 已停止(无响应体)
        '401':
          $ref: '#/paths/~1api~1health~1runtime/get/responses/401'
        '404':
          description: 频道不存在
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/Error'
        '409':
          description: 未在录制(ErrNotRecording)
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/Error'

