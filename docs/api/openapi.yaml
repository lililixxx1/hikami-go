      tags: [术语表]
      operationId: approveGlobalGlossaryCandidate
      summary: 审批通过全局候选词
      description: |
        状态机:已 rejected 的候选不能 approve(`approved candidate cannot be approved` /
        `rejected candidate cannot be approved`)→ ErrInvalidCandidate → **400**。
        请求体全可选(容 EOF:无请求体也允许)。
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: 'components/schemas/glossary.yaml#/ApproveCandidateRequest'
      responses:
        '200':
          description: 已通过
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/OkResponse'
        '400':
          description: cid 非法或状态机冲突(已 rejected/approved)
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/Error'
        '404':
          description: 候选不存在
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/Error'

  /api/glossary/candidates/{cid}/reject:
    parameters:
      - $ref: '#/components/parameters/GlossaryCandidateID'
    post:
      tags: [术语表]
      operationId: rejectGlobalGlossaryCandidate
      summary: 拒绝全局候选词
      description: |
        状态机:已 approved 的候选不能 reject → ErrInvalidCandidate → **400**。
        无请求体。
      responses:
        '200':
          description: 已拒绝
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/OkResponse'
        '400':
          description: cid 非法或状态机冲突(已 approved)
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/Error'
        '404':
          description: 候选不存在
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/Error'

