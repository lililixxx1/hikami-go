      responses:
        '200':
          description: 已删除
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/OkResponse'
        '401':
          $ref: '#/paths/~1api~1health~1runtime/get/responses/401'
        '403':
          description: 不能删除内置模板
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: cannot delete built-in template
