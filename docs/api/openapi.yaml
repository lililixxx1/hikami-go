      operationId: getPublishConfig
      summary: 获取发布配置
      responses:
        '200':
          description: 发布配置
          content:
            application/json:
              schema:
                $ref: 'components/schemas/config-sections.yaml#/PublishConfigResponse'
        '401':
          $ref: '#/paths/~1api~1health~1runtime/get/responses/401'
    put:
      tags: [配置]
      operationId: updatePublishConfig
      summary: 更新发布配置(patch 语义)
      description: |
        全字段可选(presence-aware):传哪个改哪个,未传保持原值。
        传了但值非法(如 mode 非 draft/publish)→ 400。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: 'components/schemas/config-sections.yaml#/PublishConfigRequest'
      responses:
        '200':
          description: 更新后的发布配置
          content:
            application/json:
              schema:
                $ref: 'components/schemas/config-sections.yaml#/PublishConfigResponse'
        '400':
          description: 字段值非法(如 private_pub 非 0/1/2,且 0 会被规范化为 2;timer_pub_time 超区间)
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/Error'
        '401':
          $ref: '#/paths/~1api~1health~1runtime/get/responses/401'

  /api/config/recap:
    get:
      tags: [配置]
      operationId: getRecapConfig
      summary: 获取回顾 AI 配置
