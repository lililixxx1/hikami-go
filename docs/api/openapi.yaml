      responses:
        '200':
          description: 已导入计数
          content:
            application/json:
              schema:
                type: object
                required: [imported]
                properties:
                  imported:
                    type: integer
        '400':
          description: content 缺失
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/Error'
        '401':
          $ref: '#/paths/~1api~1health~1runtime/get/responses/401'

  /api/glossary/import/json:
    post:
      tags: [术语表]
      operationId: importGlobalGlossaryJSON
      summary: 从 JSON 导入全局词条
      description: |
        请求体是 **raw JSON**,非 application/json wrapper。后端 io.ReadAll(ctx.Request.Body) 直接读。
        支持两种格式:① GlossaryExport 对象 `{"entries":[...],"note":""}`(ExportJSON 产出);
        ② 裸数组 `[{...},{...}]`(前端 JSON.parse 典型形态)。非法 JSON 返回 400。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: 'components/schemas/glossary.yaml#/GlossaryExport'
      responses:
        '200':
          description: 已导入计数
          content:
            application/json:
              schema:
                type: object
                required: [imported]
                properties:
                  imported:
                    type: integer
        '400':
          description: 读取失败或 JSON 非法
          content:
            application/json:
