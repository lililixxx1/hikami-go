    put:
      tags: [配置]
      operationId: updateRecapConfig
      summary: 更新回顾 AI 配置(密钥三态)
      description: |
        全字段可选。密钥三态:
        - 不传 api_key/clear_key → 保持
        - 传 api_key → 设置
        - 传 clear_key=true → 清空
        provider 传了必须在白名单(openai_compatible/anthropic/claude_cli/codex_cli/local)。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: 'components/schemas/config-sections.yaml#/RecapConfigRequest'
      responses:
        '200':
          description: 更新后的回顾配置
          content:
            application/json:
              schema:
                $ref: 'components/schemas/config-sections.yaml#/RecapConfigResponse'
        '400':
          description: 字段值非法(provider 非白名单/max_tokens<0 等)
          content:
            application/json:
              schema:
                $ref: 'components/schemas/common.yaml#/Error'
