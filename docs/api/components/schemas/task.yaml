# 任务域 schema
# 真相源:internal/worker/task.go:41 Task struct / :31 Status 常量

Task:
  type: object
  description: |
    异步任务实体。下载/转写/回顾/上传/发布/归档 都是异步任务,通过 worker 池执行。
    端点 POST .../download|asr/submit|recap/*|upload|fetch|publish|archive 返回的 Task 对象。
  required:
    - id
    - channel_id
    - type
    - status
    - payload
    - progress
    - message
    - attempt
    - created_at
    - updated_at
  properties:
    id:
      type: string
      description: 任务 ID(string 化的 UUID)
    channel_id:
      type: string
    session_id:
      type: string
      description: 关联场次 ID(omitempty,部分任务类型不绑场次)
    type:
      type: string
      description: |
        任务类型。常见值:download / normalize / asr / recap / upload / fetch / archive / publish。
    status:
      type: string
      enum: [pending, running, succeeded, failed, cancelled]
    payload:
      type: string
      description: 任务负载 JSON 字符串(空时为 "{}")
    progress:
      type: integer
      minimum: 0
      maximum: 100
    message:
      type: string
      description: 进度描述
    error:
      type: string
      description: 失败时的错误消息(omitempty,仅 failed 出现)
    attempt:
      type: integer
      description: 已尝试次数(从 1 开始)
    started_at:
      type: string
      description: 开始执行时间(omitempty,本地时区 RFC3339)
    finished_at:
      type: string
      description: 完成时间(omitempty,本地时区 RFC3339)
    created_at:
      type: string
    updated_at:
      type: string
    bypass_fail_state:
      type: boolean
      description: |
        失败时不降级 session 主状态(仅写 last_error)。
        omitempty。用于"重新生成回顾"等非推进型任务(published/recap_done 下重跑 recap 失败不打回)。

TasksListResponse:
  type: object
  required: [items]
  properties:
    items:
      type: array
      items:
        $ref: 'task.yaml#/Task'

# TaskDetail / 条件字段 / BatchRetry 等在 T4 任务域 task 补充。
