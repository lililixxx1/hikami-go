# 密钥域 schema
# 真相源:
#   internal/secrets/secrets.go:128 MaskValue / :140 KnownKeys / :156 SecretView / :168 BuildView
#   internal/handler/server.go:1708 listSecrets / :1912 updateSecret(特殊拒绝 + 白名单)

SecretView:
  type: object
  description: |
    密钥视图。GET 永不返回明文,只有 masked_value(掩码)+ set + source。
    掩码规则:
    - 空 → masked_value=""
    - ≤8 字符 → "****"
    - >8 字符 → "****" + 末 4 位
  required: [key, masked_value, set, source]
  properties:
    key:
      type: string
      description: env 名(如 DASHSCOPE_API_KEY / RECAP_API_KEY / ASR_S3_ACCESS_KEY_SECRET / WEBDAV_PASSWORD)
    masked_value:
      type: string
      description: 掩码后的值(空=set=false)
    set:
      type: boolean
      description: 是否已设(db 或 env 任一有值)
    source:
      type: string
      enum: [database, environment, none]
      description: |
        - database:数据库已存(优先级高)
        - environment:进程 env(db 未存但 env 有)
        - none:未设
    updated_at:
      type: string
      description: |
        ⚠️ **仅 GET /api/secrets 列表填充**(listSecrets 从 db Secret 拷贝)。
        PUT 响应的 SecretView **不填** updated_at(BuildView 不设此字段)。
        omitempty。

SecretsListResponse:
  type: object
  description: |
    GET /api/secrets 响应。顺序按 KnownKeys(DashScope/Recap/ASRS3/WebDAV 的 Effective* env)。
  required: [items]
  properties:
    items:
      type: array
      items:
        $ref: 'secrets.yaml#/SecretView'

UpdateSecretRequest:
  type: object
  description: |
    PUT /api/secrets/{key} 请求体。
    - value 非空 → 设置密钥(secrets.Set + os.Setenv)
    - value 空串 → 删除密钥(secrets.Delete + os.Unsetenv)
  properties:
    value:
      type: string
      description: 密钥明文。空串 = 删除该密钥。
