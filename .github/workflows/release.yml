name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - name: Install frontend dependencies
        run: npm ci
        working-directory: web

      - name: Build frontend
        run: npm run build
        working-directory: web

      - name: Copy frontend to embed dir
        run: |
          rm -rf cmd/hikami/webdist
          cp -r web/dist cmd/hikami/webdist

      - name: Check Go formatting
        run: |
          test -z "$(gofmt -l cmd internal)"

      - name: Run Go vet
        run: go vet ./...

      - name: Run Go tests
        run: go test ./...

  build:
    needs: test
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
            embed_ffmpeg: true
          - goos: windows
            goarch: amd64
            embed_ffmpeg: false
          - goos: windows
            goarch: amd64
            embed_ffmpeg: true
            desktop: true
          - goos: windows
            goarch: amd64
            embed_ffmpeg: false
            desktop: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
      - name: Install frontend dependencies
        run: npm ci
        working-directory: web
      - name: Build frontend
        run: npm run build
        working-directory: web
      - name: Copy frontend to embed dir
        run: |
          rm -rf cmd/hikami/webdist
          cp -r web/dist cmd/hikami/webdist
      - name: Verify embedded ffmpeg for Windows embed
        if: matrix.embed_ffmpeg
        run: |
          # 裁剪版 ffmpeg.zip 已入库（internal/runtime/assets/ffmpeg.zip），
          # 顶层结构为 bin/ffmpeg.exe + bin/ffprobe.exe，与 ffmpeg_manifest.go 的路径一致。
          # 不再从 BtbN 下载完整版（目录结构不匹配 manifest）。
          if [ ! -f internal/runtime/assets/ffmpeg.zip ]; then
            echo "ERROR: internal/runtime/assets/ffmpeg.zip not found. Run 'make build-ffmpeg-minimal' first."
            exit 1
          fi
          echo "Embedded ffmpeg.zip size: $(du -h internal/runtime/assets/ffmpeg.zip | cut -f1)"
      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          SUFFIX=""
          LDFLAGS="-s -w"
          # 始终嵌入前端（embedded_web）；embed_ffmpeg 仅 Windows 完整版叠加
          TAGS="-tags embedded_web"
          if [ "${{ matrix.embed_ffmpeg }}" = "true" ]; then
            TAGS="-tags embed_ffmpeg,embedded_web"
          elif [ "${{ matrix.embed_ffmpeg }}" = "false" ]; then
            SUFFIX="-lite"
          fi
          # desktop 变体：加 systray tag（系统托盘）+ -H windowsgui（隐藏终端窗口）
          if [ "${{ matrix.desktop }}" = "true" ]; then
            SUFFIX="${SUFFIX}-desktop"
            TAGS="${TAGS},systray"
            LDFLAGS="${LDFLAGS} -H windowsgui"
          fi
          BINARY=hikami-${{ matrix.goos }}-${{ matrix.goarch }}${SUFFIX}
          if [ "${{ matrix.goos }}" = "windows" ]; then BINARY="${BINARY}.exe"; fi
          mkdir -p dist
          go build ${TAGS} -ldflags="${LDFLAGS}" -o dist/${BINARY} ./cmd/hikami
          echo "ARTIFACT_NAME=hikami-${{ matrix.goos }}-${{ matrix.goarch }}${SUFFIX}" >> $GITHUB_ENV
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: dist/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: hikami-*
          path: dist/
          merge-multiple: true
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/hikami-*
          generate_release_notes: true
